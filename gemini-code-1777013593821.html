<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MH Academy - Gemma 4 AI</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --user-msg: #dbeafe;
            --ai-msg: #f9fafb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Styling */
        header {
            background: linear-gradient(135deg, #1e40af, #2563eb);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 15px;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: var(--ai-msg);
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 2px;
        }

        /* Input Area */
        .input-area {
            background: white;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e5e7eb;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 25px;
            outline: none;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #1d4ed8; }

        /* Loading Animation */
        .typing { font-style: italic; color: #6b7280; font-size: 13px; }
    </style>
</head>
<body>

<header>MH Academy AI Hub (Gemma 4)</header>

<div id="chat-container">
    <div class="message ai-message">আসসালামু আলাইকুম! আমি Gemma 4, আপনাকে আজ কীভাবে সাহায্য করতে পারি?</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="এখানে লিখুন..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">পাঠান</button>
</div>

<script>
    const OLLAMA_API = "http://192.168.0.100:11434/api/generate";

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const chatContainer = document.getElementById('chat-container');
        const text = inputField.value.trim();

        if (!text) return;

        // User Message UI
        chatContainer.innerHTML += `<div class="message user-message">${text}</div>`;
        inputField.value = '';
        chatContainer.scrollTop = chatContainer.scrollHeight;

        // Loading Indicator
        const loadingId = "load-" + Date.now();
        chatContainer.innerHTML += `<div class="message ai-message typing" id="${loadingId}">Gemma চিন্তা করছে...</div>`;

        try {
            const response = await fetch(OLLAMA_API, {
                method: 'POST',
                body: JSON.stringify({
                    model: "gemma4:e4b",
                    prompt: text,
                    stream: false
                })
            });

            const data = await response.json();
            document.getElementById(loadingId).remove();
            chatContainer.innerHTML += `<div class="message ai-message">${data.response}</div>`;
        } catch (error) {
            document.getElementById(loadingId).innerHTML = "Error: ল্যাপটপের সাথে কানেক্ট করা যাচ্ছে না। ওলামা চালু আছে তো?";
        }
        
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>

</body>
</html>
